<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="../assets/1-removebg-preview.png" />

    <title>ShieldNet - Sign Up</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/signup.css">

  </head>

  <body>
    <div class="auth-container row g-0">
      <div class="col-md-6 form-section">
        <h2 class="d-flex align-items-center">
          <img
            src="../assets/1-removebg-preview.png"
            alt="Logo"
            style="height: 100px; margin-right: 12px"
          />
          SHIELDNET
        </h2>
        <p class="text-muted">Create your account</p>

        <form id="signup-form">
          <div class="mb-3 input-with-icon">
            <label class="form-label fw-semibold">Full Name</label>
            <input
              type="text"
              name="fullname"
              class="form-control"
              placeholder="Enter your full name"
              required
            />
          </div>

          <div class="mb-3 input-with-icon">
            <label class="form-label fw-semibold">Email</label>
            <input
              type="email"
              name="username"
              class="form-control"
              placeholder="Enter your email"
              required
            />
          </div>

          <div class="mb-3 input-with-icon">
            <label class="form-label fw-semibold">Password</label>
            <input
              type="password"
              name="password"
              class="form-control"
              placeholder="Enter your password"
              required
            />
          </div>

          <div class="mb-3 input-with-icon">
            <label class="form-label fw-semibold">Confirm Password</label>
            <input
              type="password"
              name="confirmpassword"
              class="form-control"
              placeholder="Enter your confirm password"
              required
            />
          </div>

          <button type="submit" class="btn btn-purple w-100" id="submitBtn">
            SIGN UP
          </button>
          <div id="error-message" class="error-message"></div>

          <p class="mt-3 text-center">
            Already have an account? <a href="login.html">Sign in</a>
          </p>
        </form>
      </div>

      <div class="col-md-6 side-panel">
        <div>
          <h3>Glad to see you!</h3>
          <p>
            Securely manage access, monitor activity, and control your smart lock
            system with ease.
          </p>
        </div>
      </div>
    </div>
  <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
  <div id="successToast" class="toast align-items-center text-bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="d-flex">
      <div class="toast-body">
        Account created successfully!
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
  </div>
</div>
  </body>
  <script src="../js/signup.js"></script>
</html>

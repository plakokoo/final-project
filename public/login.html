<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="../assets/2.png" />
    <title>ShieldNet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/login.css" />
  </head>

  <body>
    <div class="auth-container row g-0 ">
      <div class="col-md-6 form-section">
        <h2 class="d-flex align-items-center">
          <img
            src="../assets/1-removebg-preview.png"
            alt="Logo"
            style="height: 100px; margin-right: 12px"
          />
          SHIELDNET
        </h2>
        <p class="text-muted">Log in to ShieldNet</p>

        <form id="login-form">
          <div class="mb-3">
            
            <div class="form-floating mb-3 mt-3">
              <input type="email" class="form-control rounded-0" id="username" placeholder="Enter email" name="username" autocomplete="username" required>
              <label for="username">Email</label>
            </div>
            
          </div>

          <div class="mb-3">

            <div class="form-floating mb-3 mt-3">
            <input
              type="password" class="form-control rounded-0" id="password" name="password" placeholder="Enter your password" required/>
            <label for="password">Password</label>
            </div>
          </div>

          <div class="d-flex justify-content-between mb-3">
            <div class="form-check mb-3">
              <input type="checkbox" class="form-check-input" id="rememberMe" />
              <label class="form-check-label" for="rememberMe"
                >Remember me</label
              >
            </div>
            <a href="#" class="text-decoration-none">Forgot password?</a>
          </div>

          <button type="submit" class="btn btn-purple w-100" id="submitBtn">
            SIGN IN
          </button>
          <div id="error-message" class="error-message"></div>

          <p class="mt-3 text-center">
            Don't have an account? <a href="signup.html">Create account</a>
          </p>
        </form>
      </div>

      <div class="col-md-6 side-panel">
        <div>
          <h3>Welcome Back!</h3>
          <p>
            Securely manage access, monitor activity, and control your smart
            lock system with ease.
          </p>
        </div>
      </div>
    </div>
  </body>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/auth.js"></script>
</html>

<!Doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="../assets/1-removebg-preview.png">

    <title>ShieldNet</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../css/login.css">

  </head>

  <body>
    <div class="auth-container row g-0">
      <div class="col-md-6 form-section">
        <h2 class="d-flex align-items-center">
            <img src="../assets/1-removebg-preview.png" alt="Logo" style="height:100px; margin-right:12px;">
            SHIELDNET
        </h2>
        <p class="text-muted">Sign in to your account</p>

        <form id="login-form">
          <div class="mb-3">
            <label class="form-label fw-semibold">Email</label>
            <input type="email" id="username" name="username" class="form-control" placeholder="Enter your email" required />
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Password</label>
            <input
              type="password"
              class="form-control"
              name="password"
              placeholder="Enter your password"
              required
            />
          </div>

          <div class="d-flex justify-content-between mb-3">
            <div class="form-check mb-3">
  <input type="checkbox" class="form-check-input" id="rememberMe" />
  <label class="form-check-label" for="rememberMe">Remember me</label>
</div>
            <a href="#" class="text-decoration-none">Forgot password?</a>
          </div>

          <button type="submit" class="btn btn-purple w-100" id="submitBtn">SIGN IN</button>
          <div id="error-message" class="error-message"></div>

          <p class="mt-3 text-center">
            Don't have an account? <a href="signup.html">Create account</a>
          </p>
        </form>
      </div>


      <div class="col-md-6 side-panel">
        <div>
          <h3>Welcome Back!</h3>
          <p>
            Securely manage access, monitor activity, and control your smart lock system with ease.
          </p>
        </div>
      </div>
    </div>
  </body>
  <script src="../js/auth.js"></script>
</html>
